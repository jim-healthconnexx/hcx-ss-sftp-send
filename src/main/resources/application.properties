spring.application.name=hcx-ss-sftp-send

# HDC-24: Disable Spring Boot Docker Compose integration — infrastructure is managed externally
spring.docker.compose.enabled=false

# HDC-24: Database — values provided via environment variables at runtime
# Required env vars: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
# Example: SPRING_DATASOURCE_URL=jdbc:postgresql://host:5432/hcx?currentSchema=healthdata
spring.datasource.driver-class-name=org.postgresql.Driver

# HDC-24: jOOQ dialect
spring.jooq.sql-dialect=POSTGRES

# HDC-24: Actuator — expose only health and loggers endpoints
# POST /actuator/loggers/{loggerName}  body: {"configuredLevel":"DEBUG"}  to change level at runtime
# Security note: the loggers write endpoint must be protected by network ACL or Spring Security in production
management.endpoints.web.exposure.include=health,loggers
management.endpoint.loggers.enabled=true

# HDC-24: SureScripts SFTP — placeholder values; real credentials to be provided later
# These can be overridden via env vars: SURESCRIPTS_SFTP_HOST, SURESCRIPTS_SFTP_USERNAME, etc.
surescripts.sftp.host=192.168.0.81
surescripts.sftp.port=22
surescripts.sftp.username=testuser
surescripts.sftp.password=testuser
surescripts.sftp.remote-directory=uploads

# HDC-24: AWS S3 — endpoint override is optional (set for LocalStack local dev; omit for real AWS)
# AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and AWS_REGION are read directly by the AWS SDK from env vars.
# AWS_S3_ENDPOINT is mapped by Spring Boot relaxed binding to aws.s3.endpoint (set in .env.local only).
